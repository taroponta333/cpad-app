plugins {
    id 'com.android.application'
}

android {
    compileSdk 33 // ビルドに必要なSDK

    defaultConfig {
        applicationId "com.example.retrotool"
        minSdk 17     // Android 4.2.2 (初代チャレンジタッチ用)
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Android 4.2.2でもクラッシュしない最小限のライブラリ
    implementation 'androidx.appcompat:appcompat:1.3.1'
}
