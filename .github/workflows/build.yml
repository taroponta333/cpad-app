name: Build Android 4.2.2 Tool

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'  # Gradle 7.5.1と一番相性が良いJava 11に戻します
        distribution: 'temurin'
        
    - name: Setup Gradle 7.5.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.5.1'  # ⚠️最新の9.5.1を無視して7.5.1を強制使用
        
    - name: Create Build Files
      run: |
        echo "rootProject.name = 'RetroTool'" > settings.gradle
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
        }
        apply plugin: 'com.android.application'
        android {
            compileSdk 33
            defaultConfig {
                applicationId "com.example.retrotool"
                minSdkVersion 17
                targetSdk 22
            }
            sourceSets {
                main {
                    manifest.srcFile 'AndroidManifest.xml'
                    java.srcDirs = ['java']; res.srcDirs = ['res']
                }
            }
        }
        EOF
        
    - name: Build with Gradle
      run: gradle assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: retrotool-apk
        path: build/outputs/apk/debug/*.apk
